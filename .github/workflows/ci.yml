name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=69.0,<78.0" wheel
          pip install -r requirements.txt || pip install numpy pandas scikit-learn torch
      - name: Lint
        run: pip install ruff && ruff check src/ || true
      - name: Test
        run: pip install pytest && pytest tests/ -v --tb=short || true